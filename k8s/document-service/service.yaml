apiVersion: v1
kind: Service
metadata:
  name: document-service
  namespace: cargotrack
  labels:
    app.kubernetes.io/name: document-service
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: document-service
  ports:
    - name: http
      protocol: TCP
      port: 4001
      targetPort: http
