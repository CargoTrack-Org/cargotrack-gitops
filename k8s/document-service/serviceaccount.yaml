# document-service ServiceAccount with IRSA
# Replace <IRSA_DOCUMENT_SERVICE_ROLE_ARN> with:
#   terraform output -raw irsa_document_service_role_arn
# IRSA grants: S3 (read/write), Textract, KMS decrypt
apiVersion: v1
kind: ServiceAccount
metadata:
  name: document-service
  namespace: cargotrack
  labels:
    app.kubernetes.io/name: document-service
    app.kubernetes.io/component: backend
  annotations:
    eks.amazonaws.com/role-arn: "<IRSA_DOCUMENT_SERVICE_ROLE_ARN>"
automountServiceAccountToken: true
