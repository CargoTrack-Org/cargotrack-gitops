# ─────────────────────────────────────────────────────────────────────────────
# Core Service — ServiceAccount with IRSA
#
# The eks.amazonaws.com/role-arn annotation wires the pod to the IAM role
# created by modules/irsa/ — giving the pod credentials to:
#   - Read Secrets Manager (db-secret, app-secret)
#   - Publish to EventBridge
#   - Publish to SQS compliance queue
#   - Read/write S3 documents bucket
#   - Decrypt via KMS CMK
#
# Replace <IRSA_CORE_SERVICE_ROLE_ARN> with:
#   terraform output -raw irsa_core_service_role_arn
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: core-service
  namespace: cargotrack
  labels:
    app.kubernetes.io/name: core-service
    app.kubernetes.io/component: backend
  annotations:
    eks.amazonaws.com/role-arn: "<IRSA_CORE_SERVICE_ROLE_ARN>"
automountServiceAccountToken: true
