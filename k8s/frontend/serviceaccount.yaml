# ─────────────────────────────────────────────────────────────────────────────
# Frontend — ServiceAccount
# No IRSA required: nginx is stateless and makes no AWS API calls directly.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: cargotrack
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
automountServiceAccountToken: false
