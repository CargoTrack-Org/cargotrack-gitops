# ─────────────────────────────────────────────────────────────────────────────
# Frontend — Service
#
# Type: NodePort (AWS ALB targets pods directly via IP mode)
# The ALB Ingress uses target-type: ip, so NodePort is used by the controller
# to register pod IPs in ALB target groups.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cargotrack
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
  annotations:
    # ALB health check uses /health (defined in nginx.conf)
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/health"
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
