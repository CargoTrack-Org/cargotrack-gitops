# ─────────────────────────────────────────────────────────────────────────────
# CargoTrack Kubernetes Secrets — Database Credentials
#
# ⚠️  IMPORTANT: This file is a TEMPLATE.
#     Never commit real secrets to version control.
#     Run scripts/generate-k8s-secrets.sh to populate from AWS Secrets Manager.
#
# In production these values are base64-encoded strings of the values
# retrieved from AWS Secrets Manager (cargotrack-db-secret).
#
# Retrieval command (run after terraform apply):
#   aws secretsmanager get-secret-value \
#     --secret-id cargotrack-db-secret \
#     --query SecretString --output text | jq .
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: cargotrack
  labels:
    app.kubernetes.io/name: cargotrack
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # base64-encoded values — replace with actual secrets after terraform apply
  # echo -n "your-value" | base64
  DATABASE_HOST: "<BASE64_DATABASE_HOST>"
  DATABASE_PORT: "NTQzMg=="    # 5432
  DATABASE_NAME: "<BASE64_DATABASE_NAME>"
  DATABASE_USER: "<BASE64_DATABASE_USER>"
  DATABASE_PASSWORD: "<BASE64_DATABASE_PASSWORD>"
