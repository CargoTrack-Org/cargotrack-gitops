# ─────────────────────────────────────────────────────────────────────────────
# CargoTrack Kubernetes Secrets — Application Secrets
#
# ⚠️  TEMPLATE — Never commit real secrets. Run scripts/generate-k8s-secrets.sh
#
# Source: AWS Secrets Manager (cargotrack-application-secret)
#
# Retrieval:
#   aws secretsmanager get-secret-value \
#     --secret-id cargotrack-application-secret \
#     --query SecretString --output text | jq .
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: cargotrack
  labels:
    app.kubernetes.io/name: cargotrack
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # JWT signing secret — same value used by core-service to sign tokens
  # and document-service to verify them
  # echo -n "your-jwt-secret" | base64
  JWT_SECRET: "<BASE64_JWT_SECRET>"

  # Admin account seeded by core-service on first startup
  ADMIN_EMAIL: "<BASE64_ADMIN_EMAIL>"
  ADMIN_PASSWORD: "<BASE64_ADMIN_PASSWORD>"

  # Shared secret for service-to-service calls (core → ai-service /api/compliance/trigger)
  INTERNAL_API_SECRET: "<BASE64_INTERNAL_API_SECRET>"
