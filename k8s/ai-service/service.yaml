apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: cargotrack
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/component: ai
spec:
  type: ClusterIP
  selector:
    app: ai-service
  ports:
    - name: http
      protocol: TCP
      port: 4002
      targetPort: http
