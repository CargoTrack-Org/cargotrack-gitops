# ai-service ServiceAccount with IRSA
# Replace <IRSA_AI_SERVICE_ROLE_ARN> with:
#   terraform output -raw irsa_ai_service_role_arn
# IRSA grants: SQS consume, Bedrock invoke (Nova Lite + Pro), Textract, S3 read, DynamoDB write, KMS decrypt
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-service
  namespace: cargotrack
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/component: ai
  annotations:
    eks.amazonaws.com/role-arn: "<IRSA_AI_SERVICE_ROLE_ARN>"
automountServiceAccountToken: true
