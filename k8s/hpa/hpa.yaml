# ── AI Service HPA ────────────────────────────────────────────────────────────
# AI service has higher thresholds because Bedrock calls are latency-bound,
# not CPU-bound. Scale-in is more conservative to preserve SQS polling state.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service-hpa
  namespace: cargotrack
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/component: hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 90
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 600   # 10 min cooldown — SQS polling continuity
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
---
