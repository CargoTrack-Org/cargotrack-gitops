# CargoTrack — document-dev ArgoCD Application
# Managed by: ArgoCD root-app (App-of-Apps pattern)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: document-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CargoTrack-Org/cargotrack-helm.git
    targetRevision: main
    path: document-service
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cargotrack-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
