# CargoTrack Dev Application
# ArgoCD watches cargotrack-helm/cargotrack/ and deploys to the EKS cluster.
# On any push that updates cargotrack/values-dev.yaml (e.g. image tag changes),
# ArgoCD detects drift and performs a rolling deploy automatically.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cargotrack-dev
  namespace: argocd
  # Note: finalizer intentionally omitted to prevent Terraform destroy timeouts.
  # ALB cleanup is handled by the pre_destroy_ingress_cleanup null_resource in k8s.tf.
spec:
  project: default
  source:
    repoURL: https://github.com/CargoTrack-Org/cargotrack-helm.git
    targetRevision: main
    path: cargotrack
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cargotrack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
