# CargoTrack — ai-prod ArgoCD Application
# Managed by: ArgoCD root-app (App-of-Apps pattern)
#
# ai-service prod specific:
#   - BEDROCK_MODEL_ID=nova-pro-v1 (in values-prod.yaml — higher accuracy)
#   - minReplicas: 1 (singleton SQS consumer in prod)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CargoTrack-Org/cargotrack-helm.git
    targetRevision: main
    path: ai-service
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cargotrack-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
